<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="title.catalog">Catalog — RePluG</title>
    <link rel="stylesheet" href="style.css?v=55">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">Re<span>PluG</span></a>
            <div class="nav-right">
                <a id="nav-discord" href="#" class="discord-link" data-i18n="nav.discord">Discord</a>
                <a href="https://www.usfans.com/register?ref=MGRSBE" target="_blank" rel="noopener" class="usfans-link" data-i18n="nav.usfans">Sign up USFans</a>
            </div>
        </div>
    </nav>

    <div class="cat-bar cat-bar-main">
        <div class="container">
            <div class="cat-scroll" id="categoryPills"></div>
        </div>
    </div>

    <div class="filter-bar">
        <div class="container">
            <div class="filter-inner">
                <div class="search-box">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="searchInput" placeholder="Search products, batches..." autocomplete="off" data-i18n-attr="placeholder:filter.search">
                </div>
                <select id="sortSelect" class="sort-select">
                    <option value="default" data-i18n="sort.default">Default</option>
                    <option value="price-asc" data-i18n="sort.priceAsc">Price: low to high</option>
                    <option value="price-desc" data-i18n="sort.priceDesc">Price: high to low</option>
                    <option value="name-asc" data-i18n="sort.nameAsc">Name: A–Z</option>
                </select>
            </div>
        </div>
    </div>

    <div class="cat-bar cat-bar-brands">
        <div class="container">
            <div class="cat-scroll" id="brandTabs"></div>
        </div>
    </div>

    <div class="cat-bar cat-bar-sub">
        <div class="container">
            <div class="cat-scroll" id="modelTabs"></div>
        </div>
    </div>

    <main class="shop-main">
        <div class="container">
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
            </div>
            <div class="error-state" id="errorState" style="display:none">
                <p data-i18n="state.errorProducts">⚠️ Failed to load products. Please refresh the page.</p>
            </div>
            <div class="results-bar" id="resultsInfo" style="display:none">
                <span id="resultsCount"></span>
            </div>
            <div class="products-grid" id="productsGrid" style="display:none"></div>
            <div class="empty-state" id="emptyState" style="display:none">
                <p data-i18n="state.empty">🔍 No results. Try a different search or category.</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text" data-i18n="footer.text">© 2026 RePluG. For informational purposes only.</p>
        </div>
    </footer>

    <button type="button" id="backToTop" class="back-to-top" aria-label="Back to top" hidden>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
    </button>

    <script src="i18n.js?v=16"></script>
    <script src="script.js?v=19"></script>
    <script src="currency.js?v=4"></script>
    <script src="cart.js?v=5"></script>
    <script src="katalog.js?v=47"></script>
</body>
</html>
