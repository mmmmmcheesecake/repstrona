<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog — RePluG</title>
    <link rel="stylesheet" href="style.css?v=8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">Re<span>PluG</span></a>
            <div class="nav-right">
                <a id="nav-discord" href="#" class="discord-link">Discord</a>
                <button class="theme-toggle" id="themeToggle"><span class="icon">◐</span></button>
            </div>
        </div>
    </nav>

    <div class="filter-bar">
        <div class="container">
            <div class="filter-inner">
                <div class="search-box">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="searchInput" placeholder="Szukaj produktu, batcha..." autocomplete="off">
                </div>
                <select id="sortSelect" class="sort-select">
                    <option value="default">Domyślnie</option>
                    <option value="price-asc">Cena: rosnąco</option>
                    <option value="price-desc">Cena: malejąco</option>
                    <option value="name-asc">Nazwa: A–Z</option>
                </select>
            </div>
        </div>
    </div>

    <div class="cat-bar">
        <div class="container">
            <div class="cat-scroll" id="brandTabs"></div>
        </div>
    </div>

    <div class="cat-bar cat-bar-sub">
        <div class="container">
            <div class="cat-scroll" id="modelTabs"></div>
        </div>
    </div>

    <main class="shop-main">
        <div class="container">
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
            </div>
            <div class="error-state" id="errorState" style="display:none">
                <p>⚠️ Nie udało się załadować produktów. Spróbuj odświeżyć stronę.</p>
            </div>
            <div class="results-bar" id="resultsInfo" style="display:none">
                <span id="resultsCount"></span>
            </div>
            <div class="products-grid" id="productsGrid" style="display:none"></div>
            <div class="empty-state" id="emptyState" style="display:none">
                <p>🔍 Brak wyników. Spróbuj innej frazy lub zmień kategorię.</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">© 2026 RePluG. Strona ma charakter informacyjny.</p>
        </div>
    </footer>

    <script src="script.js?v=8"></script>
    <script src="katalog.js?v=8"></script>
</body>
</html>
