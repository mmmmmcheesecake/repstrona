<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product — RePluG</title>
    <link rel="stylesheet" href="style.css?v=16">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">Re<span>PluG</span></a>
            <div class="nav-right">
                <a id="nav-discord" href="#" class="discord-link">Discord</a>
                <a href="https://www.usfans.com/register?ref=MGRSBE" target="_blank" rel="noopener" class="usfans-link">Sign up USFans</a>
            </div>
        </div>
    </nav>

    <main class="product-page">
        <div class="container">
            <a href="javascript:history.length>1?history.back():(location.href='katalog.html')" class="back-link">← Back</a>

            <div class="loading-state" id="loadingState"><div class="spinner"></div></div>
            <div class="error-state" id="errorState" style="display:none">
                <p>⚠️ Failed to load product. <a href="katalog.html">Back to catalog</a>.</p>
            </div>

            <div class="product-detail" id="productDetail" style="display:none">
                <div class="pd-gallery">
                    <div class="pd-main-img">
                        <img id="pdMainImg" alt="">
                    </div>
                    <div class="pd-thumbs" id="pdThumbs"></div>
                </div>

                <div class="pd-info">
                    <div class="pd-meta" id="pdMeta"></div>
                    <h1 class="pd-name" id="pdName"></h1>
                    <div class="pd-price-row">
                        <span class="pd-price" id="pdPrice"></span>
                        <span class="pd-stock" id="pdStock"></span>
                    </div>

                    <div class="pd-options" id="pdOptions"></div>

                    <div class="pd-buttons">
                        <a id="pdBuy" href="#" target="_blank" rel="noopener" class="card-btn primary pd-buy">Buy from agent →</a>
                        <a id="pdBudget" href="#" target="_blank" rel="noopener" class="card-btn pd-budget" style="display:none">Budget version</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">© 2026 RePluG. For informational purposes only.</p>
        </div>
    </footer>

    <script src="script.js?v=11"></script>
    <script src="currency.js?v=2"></script>
    <script src="produkt.js?v=17"></script>
</body>
</html>
