<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="cart.title">Cart — RePluG</title>
    <link rel="stylesheet" href="style.css?v=27">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="logo">Re<span>PluG</span></a>
            <div class="nav-right">
                <a id="nav-discord" href="#" class="discord-link" data-i18n="nav.discord">Discord</a>
                <a href="https://www.usfans.com/register?ref=MGRSBE" target="_blank" rel="noopener" class="usfans-link" data-i18n="nav.usfans">Sign up USFans</a>
            </div>
        </div>
    </nav>

    <main class="cart-page">
        <div class="container">
            <a href="katalog.html" class="back-link" data-i18n="cart.continue">← Continue shopping</a>

            <div id="cartReadonlyBanner" class="cart-banner" style="display:none">
                <span data-i18n="cart.viewing">Viewing shared cart</span>
                <button id="cartClone" class="card-btn primary" data-i18n="cart.clone">Save to my cart</button>
            </div>

            <h1 class="cart-title" data-i18n="cart.heading">Cart</h1>

            <div id="cartEmpty" class="cart-empty" style="display:none">
                <p data-i18n="cart.empty">Your cart is empty.</p>
                <a href="katalog.html" class="card-btn primary" data-i18n="cart.browse">Browse catalog</a>
            </div>

            <div id="cartItems" class="cart-items"></div>

            <div id="cartFooter" class="cart-footer" style="display:none">
                <div class="cart-total-row">
                    <span class="cart-total-label" data-i18n="cart.total">Total</span>
                    <span class="cart-total-value" id="cartTotalValue"></span>
                </div>
                <div class="cart-actions">
                    <button id="cartShare" class="card-btn primary" data-i18n="cart.share">Copy share link</button>
                    <button id="cartClear" class="card-btn cart-clear" data-i18n="cart.clear">Clear cart</button>
                </div>
                <div id="cartShareUrl" class="cart-share-url" style="display:none">
                    <input type="text" id="cartShareInput" readonly>
                    <button id="cartCopyBtn" class="card-btn" data-i18n="cart.copy">Copy</button>
                </div>
                <p id="cartToast" class="cart-toast" style="display:none"></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text" data-i18n="footer.text">© 2026 RePluG. For informational purposes only.</p>
        </div>
    </footer>

    <script src="i18n.js?v=5"></script>
    <script src="script.js?v=11"></script>
    <script src="currency.js?v=3"></script>
    <script src="cart.js?v=2"></script>
    <script src="koszyk.js?v=2"></script>
</body>
</html>
